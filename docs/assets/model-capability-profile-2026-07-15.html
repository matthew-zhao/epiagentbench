      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }
    #disease-model-capability .cap-panel,
    #disease-model-capability .scenario-panel {
      min-width: 0;
    }
    #disease-model-capability .panel-label {
      margin: 0 0 6px;
      color: var(--foreground);
      font-weight: 500;
    }
    #disease-model-capability .panel-context {
      margin-left: 6px;
      color: var(--muted-foreground);
      font-weight: 400;
    }
    #disease-model-capability svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }
    #disease-model-capability .axis,
    #disease-model-capability .grid-line {
      stroke: var(--border);
      stroke-width: 1;
    }
    #disease-model-capability .grid-line {
      opacity: 0.7;
    }
    #disease-model-capability .axis-label,
    #disease-model-capability .row-label,
    #disease-model-capability .score-label,
    #disease-model-capability .model-label {
      fill: var(--foreground);
      font-family: inherit;
    }
    #disease-model-capability .axis-label,
    #disease-model-capability .model-label {
      fill: var(--muted-foreground);
    }
    #disease-model-capability .series-line {
      stroke-width: 2;
      opacity: 0.8;
    }
    #disease-model-capability .series-dot {
      stroke: var(--background);
      stroke-width: 1.5;
    }
    #disease-model-capability .scenario-panel {
      margin-top: 22px;
    }
    #disease-model-capability .heat-cell {
      stroke: var(--background);
      stroke-width: 2;
    }
    #disease-model-capability .invalid-mark {
      fill: var(--destructive);
      font-family: inherit;
      font-weight: 500;
    }
    #disease-model-capability .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      margin: 8px 0 0;
      color: var(--foreground);
    }
    #disease-model-capability .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    #disease-model-capability .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--series);
    }
    @media (max-width: 560px) {
      #disease-model-capability .cap-grid {
        grid-template-columns: 1fr;
      }
    }
  &lt;/style&gt;

  &lt;div class=&quot;cap-grid&quot;&gt;
    &lt;section class=&quot;cap-panel&quot; aria-labelledby=&quot;unconditional-label&quot;&gt;
      &lt;p class=&quot;panel-label&quot; id=&quot;unconditional-label&quot;&gt;System performance &lt;span class=&quot;panel-context&quot;&gt;all runs; failures count as zero&lt;/span&gt;&lt;/p&gt;
      &lt;svg id=&quot;cap-unconditional&quot; viewBox=&quot;0 0 350 388&quot; role=&quot;img&quot; aria-label=&quot;Percent of available points by capability across all five scheduled episodes for Luna, Sonnet, and Kimi&quot;&gt;&lt;/svg&gt;
    &lt;/section&gt;
    &lt;section class=&quot;cap-panel&quot; aria-labelledby=&quot;conditional-label&quot;&gt;
      &lt;p class=&quot;panel-label&quot; id=&quot;conditional-label&quot;&gt;Task skill when valid &lt;span class=&quot;panel-context&quot;&gt;failed runs excluded&lt;/span&gt;&lt;/p&gt;
      &lt;svg id=&quot;cap-conditional&quot; viewBox=&quot;0 0 350 388&quot; role=&quot;img&quot; aria-label=&quot;Percent of available points by capability on valid episodes only for Luna, Sonnet, and Kimi&quot;&gt;&lt;/svg&gt;
    &lt;/section&gt;
  &lt;/div&gt;

  &lt;div class=&quot;legend&quot; aria-label=&quot;Model legend&quot;&gt;
    &lt;span class=&quot;legend-item&quot;&gt;&lt;span class=&quot;legend-swatch&quot; style=&quot;--series: var(--viz-series-1)&quot;&gt;&lt;/span&gt;Luna · 5/5 valid&lt;/span&gt;
    &lt;span class=&quot;legend-item&quot;&gt;&lt;span class=&quot;legend-swatch&quot; style=&quot;--series: var(--viz-series-2)&quot;&gt;&lt;/span&gt;Sonnet · 4/5 valid&lt;/span&gt;
    &lt;span class=&quot;legend-item&quot;&gt;&lt;span class=&quot;legend-swatch&quot; style=&quot;--series: var(--viz-series-3)&quot;&gt;&lt;/span&gt;Kimi · 3/5 valid&lt;/span&gt;
  &lt;/div&gt;

  &lt;section class=&quot;scenario-panel&quot; aria-labelledby=&quot;scenario-label&quot;&gt;
    &lt;p class=&quot;panel-label&quot; id=&quot;scenario-label&quot;&gt;Scenario scores &lt;span class=&quot;panel-context&quot;&gt;0–100; × marks an invalid run&lt;/span&gt;&lt;/p&gt;
    &lt;svg id=&quot;scenario-heatmap&quot; viewBox=&quot;0 0 720 284&quot; role=&quot;img&quot; aria-label=&quot;Five scenario scores for Luna, Sonnet, and Kimi, including invalid runs&quot;&gt;&lt;/svg&gt;
  &lt;/section&gt;

  &lt;div class=&quot;sr-only&quot;&gt;
    &lt;table&gt;
      &lt;caption&gt;Capability percentages, all scheduled runs&lt;/caption&gt;
      &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Capability&lt;/th&gt;&lt;th&gt;Luna&lt;/th&gt;&lt;th&gt;Sonnet&lt;/th&gt;&lt;th&gt;Kimi&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
      &lt;tbody&gt;
        &lt;tr&gt;&lt;th&gt;Outbreak judgment&lt;/th&gt;&lt;td&gt;99.1&lt;/td&gt;&lt;td&gt;78.6&lt;/td&gt;&lt;td&gt;59.6&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Case finding&lt;/th&gt;&lt;td&gt;89.3&lt;/td&gt;&lt;td&gt;72.3&lt;/td&gt;&lt;td&gt;40.0&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Causal diagnosis&lt;/th&gt;&lt;td&gt;69.8&lt;/td&gt;&lt;td&gt;51.1&lt;/td&gt;&lt;td&gt;37.4&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Intervention&lt;/th&gt;&lt;td&gt;40.0&lt;/td&gt;&lt;td&gt;0&lt;/td&gt;&lt;td&gt;0&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Evidence&lt;/th&gt;&lt;td&gt;39.6&lt;/td&gt;&lt;td&gt;20.4&lt;/td&gt;&lt;td&gt;23.4&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Forecasting&lt;/th&gt;&lt;td&gt;53.9&lt;/td&gt;&lt;td&gt;46.3&lt;/td&gt;&lt;td&gt;40.3&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Efficiency&lt;/th&gt;&lt;td&gt;49.7&lt;/td&gt;&lt;td&gt;39.8&lt;/td&gt;&lt;td&gt;24.4&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;th&gt;Handoff&lt;/th&gt;&lt;td&gt;100&lt;/td&gt;&lt;td&gt;80&lt;/td&gt;&lt;td&gt;60&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;disease-model-capability&#x27;);
      const ns = &#x27;http://www.w3.org/2000/svg&#x27;;
      const models = [
        { id: &#x27;luna&#x27;, label: &#x27;Luna&#x27;, color: &#x27;var(--viz-series-1)&#x27;, offset: -5 },
        { id: &#x27;sonnet&#x27;, label: &#x27;Sonnet&#x27;, color: &#x27;var(--viz-series-2)&#x27;, offset: 0 },
        { id: &#x27;kimi&#x27;, label: &#x27;Kimi&#x27;, color: &#x27;var(--viz-series-3)&#x27;, offset: 5 }
      ];
      const dimensions = [
        [&#x27;Outbreak judgment&#x27;, &#x27;classification&#x27;],
        [&#x27;Case finding&#x27;, &#x27;line_list&#x27;],
        [&#x27;Causal diagnosis&#x27;, &#x27;hypothesis&#x27;],
        [&#x27;Intervention&#x27;, &#x27;response_utility&#x27;],
        [&#x27;Evidence&#x27;, &#x27;evidence&#x27;],
        [&#x27;Forecasting&#x27;, &#x27;prospective_forecast&#x27;],
        [&#x27;Efficiency&#x27;, &#x27;efficiency&#x27;],
        [&#x27;Handoff&#x27;, &#x27;handoff&#x27;]
      ];
      const values = {
        unconditional: {
          luna: [99.1, 89.3, 69.8, 40.0, 39.6, 53.9, 49.7, 100.0],
          sonnet: [78.6, 72.3, 51.1, 0.0, 20.4, 46.3, 39.8, 80.0],
          kimi: [59.6, 40.0, 37.4, 0.0, 23.4, 40.3, 24.4, 60.0]
        },
        conditional: {
          luna: [99.1, 89.3, 69.8, 40.0, 39.6, 53.9, 49.7, 100.0],
          sonnet: [98.2, 90.4, 63.8, 0.0, 25.5, 57.9, 49.8, 100.0],
          kimi: [99.4, 66.7, 62.3, 0.0, 39.0, 67.1, 40.7, 100.0]
        }
      };

      const add = (parent, name, attrs, text) =&gt; {
        const node = document.createElementNS(ns, name);
        Object.entries(attrs || {}).forEach(([key, value]) =&gt; node.setAttribute(key, value));
        if (text !== undefined) node.textContent = text;
        parent.appendChild(node);
        return node;
      };

      const drawCapability = (svgId, mode) =&gt; {
        const svg = root.querySelector(`#${svgId}`);
        const left = 116;
        const right = 334;
        const top = 36;
        const rowHeight = 42;
        [0, 50, 100].forEach((tick) =&gt; {
          const x = left + (right - left) * tick / 100;
          add(svg, &#x27;line&#x27;, { x1: x, x2: x, y1: top - 17, y2: top + rowHeight * 7 + 15, class: &#x27;grid-line&#x27; });
          add(svg, &#x27;text&#x27;, { x, y: 12, &#x27;text-anchor&#x27;: tick === 0 ? &#x27;start&#x27; : tick === 100 ? &#x27;end&#x27; : &#x27;middle&#x27;, class: &#x27;axis-label&#x27;, &#x27;font-size&#x27;: 11 }, `${tick}%`);
        });
        dimensions.forEach(([label], index) =&gt; {
          const y = top + index * rowHeight;
          add(svg, &#x27;text&#x27;, { x: left - 9, y: y + 4, &#x27;text-anchor&#x27;: &#x27;end&#x27;, class: &#x27;row-label&#x27;, &#x27;font-size&#x27;: 11 }, label);
          add(svg, &#x27;line&#x27;, { x1: left, x2: right, y1: y, y2: y, class: &#x27;axis&#x27; });
          models.forEach((model) =&gt; {
            const value = values[mode][model.id][index];
            const x = left + (right - left) * value / 100;
            const shiftedY = y + model.offset;
            add(svg, &#x27;line&#x27;, { x1: left, x2: x, y1: shiftedY, y2: shiftedY, class: &#x27;series-line&#x27;, stroke: model.color });
            add(svg, &#x27;circle&#x27;, { cx: x, cy: shiftedY, r: 4, class: &#x27;series-dot&#x27;, fill: model.color });
            if (value === 0 || value &gt;= 95) {
              add(svg, &#x27;text&#x27;, { x: value &gt;= 95 ? x - 7 : x + 7, y: shiftedY + 3.5, &#x27;text-anchor&#x27;: value &gt;= 95 ? &#x27;end&#x27; : &#x27;start&#x27;, class: &#x27;score-label&#x27;, &#x27;font-size&#x27;: 10 }, `${Math.round(value)}`);
            }
          });
        });
      };

      drawCapability(&#x27;cap-unconditional&#x27;, &#x27;unconditional&#x27;);
      drawCapability(&#x27;cap-conditional&#x27;, &#x27;conditional&#x27;);

      const scenarios = [
        { label: &#x27;Institutional spread&#x27;, scores: { luna: 54.779, sonnet: 49.761, kimi: 0 }, invalid: [&#x27;kimi&#x27;] },
        { label: &#x27;Restaurant source&#x27;, scores: { luna: 75.988, sonnet: 53.300, kimi: 55.114 }, invalid: [] },
        { label: &#x27;Repeated introduction&#x27;, scores: { luna: 53.878, sonnet: 49.892, kimi: 51.117 }, invalid: [] },
        { label: &#x27;Coincidental venue&#x27;, scores: { luna: 52.041, sonnet: 58.990, kimi: 0 }, invalid: [&#x27;kimi&#x27;] },
        { label: &#x27;Reporting artifact&#x27;, scores: { luna: 86.169, sonnet: 0, kimi: 46.201 }, invalid: [&#x27;sonnet&#x27;] }
      ];
      const heatmap = root.querySelector(&#x27;#scenario-heatmap&#x27;);
      const heatLeft = 190;
      const cellWidth = 166;
      const cellHeight = 40;
      const heatTop = 48;
      models.forEach((model, index) =&gt; {
        add(heatmap, &#x27;text&#x27;, { x: heatLeft + index * cellWidth + cellWidth / 2, y: 22, &#x27;text-anchor&#x27;: &#x27;middle&#x27;, class: &#x27;model-label&#x27;, &#x27;font-size&#x27;: 12 }, model.label);
      });
      scenarios.forEach((scenario, row) =&gt; {
        const y = heatTop + row * cellHeight;
        add(heatmap, &#x27;text&#x27;, { x: heatLeft - 12, y: y + 25, &#x27;text-anchor&#x27;: &#x27;end&#x27;, class: &#x27;row-label&#x27;, &#x27;font-size&#x27;: 12 }, scenario.label);
        models.forEach((model, column) =&gt; {
          const value = scenario.scores[model.id];
          const x = heatLeft + column * cellWidth;
          const rect = add(heatmap, &#x27;rect&#x27;, { x, y, width: cellWidth, height: cellHeight, rx: 3, class: &#x27;heat-cell&#x27;, fill: model.color });
          rect.setAttribute(&#x27;fill-opacity&#x27;, String(0.1 + value / 100 * 0.55));
          const invalid = scenario.invalid.includes(model.id);
          add(heatmap, &#x27;text&#x27;, { x: x + cellWidth / 2, y: y + 25, &#x27;text-anchor&#x27;: &#x27;middle&#x27;, class: invalid ? &#x27;invalid-mark&#x27; : &#x27;score-label&#x27;, &#x27;font-size&#x27;: 12 }, invalid ? &#x27;0 ×&#x27; : value.toFixed(1));
        });
      });
    })();
  &lt;/script&gt;
&lt;/div&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
