      let timer = null;

      const add = (name, attrs, text) =&gt; {
        const node = document.createElementNS(ns, name);
        Object.entries(attrs || {}).forEach(([key, value]) =&gt; node.setAttribute(key, value));
        if (text !== undefined) node.textContent = text;
        scene.appendChild(node);
        return node;
      };
      const selectedRow = () =&gt; rows.find((row) =&gt; row.f === familySelect.value &amp;&amp; row.p === modelSelect.value);
      const percent = (value) =&gt; value === null || value === undefined ? &#x27;—&#x27; : `${Math.round(value * 100)}%`;
      const signed = (value) =&gt; value &gt; 0 ? `+${value.toFixed(3)}` : value.toFixed(3);

      const drawSpread = (family, stage) =&gt; {
        add(&#x27;rect&#x27;, {x:28,y:28,width:450,height:216,rx:10,class:&#x27;zone&#x27;});
        add(&#x27;rect&#x27;, {x:506,y:28,width:226,height:216,rx:10,class:&#x27;zone&#x27;});
        add(&#x27;text&#x27;, {x:46,y:54,class:&#x27;zone-label&#x27;,&#x27;font-size&#x27;:13}, family === &#x27;restaurant_point_source&#x27; ? &#x27;Restaurant + community&#x27; : family === &#x27;institution_person_to_person&#x27; ? &#x27;Long-term-care setting&#x27; : &#x27;Synthetic community&#x27;);
        add(&#x27;text&#x27;, {x:524,y:54,class:&#x27;zone-label&#x27;,&#x27;font-size&#x27;:13}, &#x27;Surveillance system&#x27;);
        add(&#x27;text&#x27;, {x:46,y:230,class:&#x27;scene-note&#x27;,&#x27;font-size&#x27;:11}, &#x27;ILLUSTRATIVE SPREAD&#x27;);

        if (family === &#x27;restaurant_point_source&#x27;) {
          add(&#x27;rect&#x27;, {x:240,y:116,width:54,height:28,rx:4,fill:&#x27;var(--viz-series-4)&#x27;,opacity:.32});
          add(&#x27;text&#x27;, {x:267,y:134,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,class:&#x27;scene-label&#x27;,&#x27;font-size&#x27;:10}, &#x27;source&#x27;);
        }
        if (family === &#x27;repeated_introduction&#x27;) {
          add(&#x27;text&#x27;, {x:440,y:74,&#x27;text-anchor&#x27;:&#x27;end&#x27;,class:&#x27;scene-note&#x27;,&#x27;font-size&#x27;:10}, &#x27;separate arrivals&#x27;);
        }
        if (family === &#x27;reporting_artifact&#x27;) {
          add(&#x27;text&#x27;, {x:46,y:74,class:&#x27;scene-note&#x27;,&#x27;font-size&#x27;:10}, &#x27;one illness, several records&#x27;);
        }

        people.forEach(([x,y]) =&gt; add(&#x27;circle&#x27;, {cx:x,cy:y,r:13,class:&#x27;person&#x27;}));
        const infected = families[family].infected;
        if (stage &gt;= 1 || (stage === 0 &amp;&amp; family === &#x27;reporting_artifact&#x27;)) {
          infected.forEach((index, order) =&gt; {
            const [x,y] = people[index];
            if (family === &#x27;institution_person_to_person&#x27; &amp;&amp; order &gt; 0) {
              const [px,py] = people[infected[order - 1]];
              add(&#x27;path&#x27;, {d:`M ${px} ${py} L ${x} ${y}`,class:&#x27;spread-link&#x27;});
            } else if (family === &#x27;restaurant_point_source&#x27;) {
              add(&#x27;path&#x27;, {d:`M 267 130 Q 300 140 ${x} ${y}`,class:&#x27;spread-link&#x27;});
            } else if (family === &#x27;repeated_introduction&#x27;) {
              add(&#x27;path&#x27;, {d:`M 460 ${55 + order * 38} L ${x} ${y}`,class:&#x27;spread-link&#x27;});
            }
            const dot = add(&#x27;circle&#x27;, {cx:x,cy:y,r:7,class:&#x27;infection moving-infection&#x27;});
            if (!reducedMotion &amp;&amp; stage === 1) {
              const origin = family === &#x27;restaurant_point_source&#x27; ? [267,130] : family === &#x27;repeated_introduction&#x27; ? [460,55 + order * 38] : order ? people[infected[order - 1]] : [x,y];
              dot.style.transform = `translate(${origin[0]-x}px,${origin[1]-y}px)`;
              requestAnimationFrame(() =&gt; { dot.style.transform = &#x27;translate(0,0)&#x27;; });
            }
          });
        }

        if (stage &gt;= 2) {
          const recordCount = family === &#x27;reporting_artifact&#x27; ? 4 : Math.min(5, infected.length);
          for (let i = 0; i &lt; recordCount; i += 1) {
            const rx = 548 + (i % 3) * 48;
            const ry = 90 + Math.floor(i / 3) * 56;
            add(&#x27;path&#x27;, {d:`M ${people[infected[Math.min(i, infected.length - 1)]][0]} ${people[infected[Math.min(i, infected.length - 1)]][1]} Q 490 120 ${rx} ${ry}`,class:&#x27;report-link&#x27;});
            add(&#x27;rect&#x27;, {x:rx-8,y:ry-8,width:16,height:16,rx:2,class:&#x27;record&#x27;});
          }
          add(&#x27;text&#x27;, {x:619,y:202,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,class:&#x27;scene-note&#x27;,&#x27;font-size&#x27;:11}, &#x27;observed records trigger an alert&#x27;);
        }
      };

      const drawResponse = (row, stage) =&gt; {
        if (stage &lt; 3) return;
        add(&#x27;path&#x27;, {d:&#x27;M 620 226 Q 540 276 440 226&#x27;,class:&#x27;control-link&#x27;});
        add(&#x27;circle&#x27;, {cx:620,cy:226,r:13,fill:&#x27;var(--viz-series-3)&#x27;});
        add(&#x27;text&#x27;, {x:620,y:230,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,fill:&#x27;var(--background)&#x27;,&#x27;font-size&#x27;:11}, &#x27;A&#x27;);
        add(&#x27;text&#x27;, {x:440,y:266,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,class:&#x27;scene-note&#x27;,&#x27;font-size&#x27;:10}, row.v ? `recorded: ${row.c}` : &#x27;run invalid before a scoreable endpoint&#x27;);
      };

      const drawOutcome = (row, family, stage) =&gt; {
        if (stage &lt; 4) return;
        if (!row.v) {
          add(&#x27;circle&#x27;, {cx:365,cy:302,r:18,class:&#x27;failure-mark&#x27;});
          add(&#x27;text&#x27;, {x:365,y:308,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,fill:&#x27;var(--background)&#x27;,&#x27;font-size&#x27;:18}, &#x27;×&#x27;);
          add(&#x27;text&#x27;, {x:394,y:307,class:&#x27;outcome-label&#x27;,&#x27;font-size&#x27;:12}, row.fail);
          return;
        }
        const artifact = family === &#x27;reporting_artifact&#x27;;
        const baseline = artifact ? row.na : row.ni;
        const realized = artifact ? row.ra : row.ri;
        const unit = artifact ? &#x27;records&#x27; : &#x27;infections&#x27;;
        const scale = 150 / Math.max(1, baseline);
        add(&#x27;text&#x27;, {x:38,y:286,class:&#x27;outcome-label&#x27;,&#x27;font-size&#x27;:11}, `No action: ${baseline} ${unit}`);
        add(&#x27;rect&#x27;, {x:148,y:275,width:baseline*scale,height:14,rx:3,class:&#x27;no-action-bar&#x27;});
        add(&#x27;text&#x27;, {x:38,y:318,class:&#x27;outcome-label&#x27;,&#x27;font-size&#x27;:11}, `Realized: ${realized} ${unit}`);
        add(&#x27;rect&#x27;, {x:148,y:307,width:realized*scale,height:14,rx:3,class:&#x27;realized-bar&#x27;});
        add(&#x27;text&#x27;, {x:330,y:286,class:&#x27;outcome-note&#x27;,&#x27;font-size&#x27;:11}, `burden ${row.b.toFixed(3)}`);
        add(&#x27;text&#x27;, {x:330,y:318,class:&#x27;outcome-note&#x27;,&#x27;font-size&#x27;:11}, `utility ${signed(row.u)}`);
        add(&#x27;text&#x27;, {x:520,y:302,class:&#x27;outcome-label&#x27;,&#x27;font-size&#x27;:12}, `Score ${row.s.toFixed(3)}`);
      };

      const renderScene = () =&gt; {
        const stage = Number(stageInput.value);
        const family = familySelect.value;
        const row = selectedRow();
        const profile = profiles[row.p];
        scene.replaceChildren();
        drawSpread(family, stage);
        drawResponse(row, stage);
        drawOutcome(row, family, stage);
        scene.setAttribute(&#x27;aria-label&#x27;, `${stages[stage]} stage for ${families[family].label}, showing ${profile.label} from the ${profile.cohort}`);

        assessment.textContent = stage &gt;= 2 ? (row.h ? `Outbreak ${percent(row.o)}; top cause ${row.h} ${percent(row.hp)}.` : &#x27;No accepted assessment.&#x27;) : &#x27;Revealed at the surveillance stage.&#x27;;
        response.textContent = stage &gt;= 3 ? `${row.c}. Final report: ${row.a}.` : &#x27;Revealed at the response stage.&#x27;;
        outcome.textContent = stage &gt;= 4 ? (row.v ? `${families[family].best}; burden ${row.b.toFixed(3)}, utility ${signed(row.u)}, score ${row.s.toFixed(3)}.` : `Invalid: ${row.fail}; fixed-denominator score 0.`) : &#x27;Revealed at the outcome stage.&#x27;;
        stageName.textContent = stages[stage];
        accessibleSummary.textContent = `${stages[stage]}. ${families[family].label}. ${profile.label}. ${assessment.textContent} ${response.textContent} ${outcome.textContent}`;
      };

      const renderModels = () =&gt; {
        const family = familySelect.value;
        modelGrid.replaceChildren();
        comparison.replaceChildren();
        profileOrder.forEach((profileId) =&gt; {
          const row = rows.find((item) =&gt; item.f === family &amp;&amp; item.p === profileId);
          const profile = profiles[profileId];
          const button = document.createElement(&#x27;button&#x27;);
          button.type = &#x27;button&#x27;;
          button.className = &#x27;btn model-choice&#x27;;
          button.setAttribute(&#x27;aria-pressed&#x27;, String(profileId === modelSelect.value));
          button.textContent = `${profile.label} · ${profile.cohort} · ${row.v ? row.s.toFixed(1) : &#x27;invalid&#x27;}`;
          button.addEventListener(&#x27;click&#x27;, () =&gt; {
            modelSelect.value = profileId;
            renderModels();
            renderScene();
          });
          modelGrid.appendChild(button);

          const tr = document.createElement(&#x27;tr&#x27;);
          const intervention = row.v ? row.c : row.fail;
          [profile.label, profile.cohort, row.h ? `${row.h} ${percent(row.hp)}` : &#x27;No accepted assessment&#x27;, intervention, row.v ? row.s.toFixed(3) : &#x27;0 ×&#x27;].forEach((value, index) =&gt; {
            const cell = document.createElement(index === 0 ? &#x27;th&#x27; : &#x27;td&#x27;);
            if (index === 2) cell.className = &#x27;optional-column&#x27;;
            cell.textContent = value;
            tr.appendChild(cell);
          });
          comparison.appendChild(tr);
        });
      };

      const stop = () =&gt; {
        if (timer !== null) window.clearInterval(timer);
        timer = null;
        playButton.textContent = &#x27;Play&#x27;;
      };
      const play = () =&gt; {
        if (timer !== null) { stop(); return; }
        if (Number(stageInput.value) &gt;= 4) stageInput.value = &#x27;0&#x27;;
        playButton.textContent = &#x27;Pause&#x27;;
        renderScene();
        timer = window.setInterval(() =&gt; {
          const next = Number(stageInput.value) + 1;
          stageInput.value = String(Math.min(4, next));
          renderScene();
          if (next &gt;= 4) stop();
        }, reducedMotion ? 1500 : 1050);
      };

      familySelect.addEventListener(&#x27;change&#x27;, () =&gt; {
        stop();
        stageInput.value = &#x27;0&#x27;;
        renderModels();
        renderScene();
      });
      modelSelect.addEventListener(&#x27;change&#x27;, () =&gt; {
        renderModels();
        renderScene();
      });
      stageInput.addEventListener(&#x27;input&#x27;, () =&gt; {
        stop();
        renderScene();
      });
      playButton.addEventListener(&#x27;click&#x27;, play);
      renderModels();
      renderScene();
    })();
  &lt;/script&gt;
&lt;/div&gt;
&lt;/body&gt;
&lt;/html&gt;
"></iframe>
</body>
</html>
