name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-light:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install benchmark and test runner
        run: python -m pip install --upgrade pip pytest -e .
      - name: Run dependency-light tests
        run: python -m pytest -q

  starsim:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      STARSIM_INSTALL_FONTS: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pinned simulator and test runner
        run: python -m pip install --upgrade pip pytest -e ".[starsim]"
      - name: Run full simulator-backed suite
        run: python -m pytest -q
