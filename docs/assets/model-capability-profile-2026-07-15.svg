<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Capability profile for Luna, Sonnet, and Kimi</title>
  <desc id="desc">Dot plot of percent of available points across all five scheduled runs. Invalid runs count as zero.</desc>
  <style>
    .bg { fill: #ffffff; }
    .fg { fill: #172033; }
    .muted { fill: #5f6b7a; }
    .grid { stroke: #d7dde5; stroke-width: 1; }
    .luna { fill: #2563eb; stroke: #2563eb; }
    .sonnet { fill: #d97706; stroke: #d97706; }
    .kimi { fill: #059669; stroke: #059669; }
    text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .fg { fill: #e6edf3; }
      .muted { fill: #9da7b3; }
      .grid { stroke: #30363d; }
      .luna { fill: #58a6ff; stroke: #58a6ff; }
      .sonnet { fill: #e3b341; stroke: #e3b341; }
      .kimi { fill: #3fb950; stroke: #3fb950; }
    }
  </style>
  <rect class="bg" width="960" height="520" rx="12"/>
  <text class="fg" x="32" y="38" font-size="20" font-weight="600">System capability across all scheduled runs</text>
  <text class="muted" x="32" y="62" font-size="13">Percent of available points · invalid runs count as zero</text>

  <circle class="luna" cx="340" cy="84" r="6"/><text class="fg" x="353" y="89" font-size="13">Luna · 5/5 valid</text>
  <rect class="sonnet" x="515" y="78" width="12" height="12"/><text class="fg" x="535" y="89" font-size="13">Sonnet · 4/5 valid</text>
  <path class="kimi" d="M730 91 L723 78 L737 78 Z"/><text class="fg" x="745" y="89" font-size="13">Kimi · 3/5 valid</text>

  <text class="muted" x="240" y="112" font-size="11" text-anchor="middle">0%</text>
  <text class="muted" x="560" y="112" font-size="11" text-anchor="middle">50%</text>
  <text class="muted" x="880" y="112" font-size="11" text-anchor="middle">100%</text>

  <g font-size="13">
    <text class="fg" x="218" y="140" text-anchor="end">Outbreak judgment</text><line class="grid" x1="240" y1="136" x2="880" y2="136"/>
    <circle class="luna" cx="874" cy="130" r="5"/><text class="fg" x="862" y="126" font-size="10" text-anchor="end">99.1</text>
    <rect class="sonnet" x="738" y="132" width="10" height="10"/><text class="fg" x="753" y="141" font-size="10">78.6</text>
    <path class="kimi" d="M621 148 L615 137 L627 137 Z"/><text class="fg" x="633" y="147" font-size="10">59.6</text>

    <text class="fg" x="218" y="185" text-anchor="end">Case finding</text><line class="grid" x1="240" y1="181" x2="880" y2="181"/>
    <circle class="luna" cx="812" cy="175" r="5"/><text class="fg" x="801" y="171" font-size="10" text-anchor="end">89.3</text>
    <rect class="sonnet" x="698" y="177" width="10" height="10"/><text class="fg" x="713" y="186" font-size="10">72.3</text>
    <path class="kimi" d="M496 193 L490 182 L502 182 Z"/><text class="fg" x="508" y="192" font-size="10">40.0</text>

    <text class="fg" x="218" y="230" text-anchor="end">Causal diagnosis</text><line class="grid" x1="240" y1="226" x2="880" y2="226"/>
    <circle class="luna" cx="687" cy="220" r="5"/><text class="fg" x="676" y="216" font-size="10" text-anchor="end">69.8</text>
    <rect class="sonnet" x="562" y="222" width="10" height="10"/><text class="fg" x="577" y="231" font-size="10">51.1</text>
    <path class="kimi" d="M479 238 L473 227 L485 227 Z"/><text class="fg" x="491" y="237" font-size="10">37.4</text>

    <text class="fg" x="218" y="275" text-anchor="end">Intervention utility</text><line class="grid" x1="240" y1="271" x2="880" y2="271"/>
    <circle class="luna" cx="496" cy="265" r="5"/><text class="fg" x="485" y="261" font-size="10" text-anchor="end">40.0</text>
    <rect class="sonnet" x="235" y="267" width="10" height="10"/><text class="fg" x="251" y="276" font-size="10">0</text>
    <path class="kimi" d="M240 283 L234 272 L246 272 Z"/>

    <text class="fg" x="218" y="320" text-anchor="end">Evidence selection</text><line class="grid" x1="240" y1="316" x2="880" y2="316"/>
    <circle class="luna" cx="493" cy="310" r="5"/><text class="fg" x="482" y="306" font-size="10" text-anchor="end">39.6</text>
    <rect class="sonnet" x="366" y="312" width="10" height="10"/><text class="fg" x="381" y="321" font-size="10">20.4</text>
    <path class="kimi" d="M390 328 L384 317 L396 317 Z"/><text class="fg" x="402" y="327" font-size="10">23.4</text>

    <text class="fg" x="218" y="365" text-anchor="end">Forecasting</text><line class="grid" x1="240" y1="361" x2="880" y2="361"/>
    <circle class="luna" cx="585" cy="355" r="5"/><text class="fg" x="574" y="351" font-size="10" text-anchor="end">53.9</text>
    <rect class="sonnet" x="531" y="357" width="10" height="10"/><text class="fg" x="546" y="366" font-size="10">46.3</text>
    <path class="kimi" d="M498 373 L492 362 L504 362 Z"/><text class="fg" x="510" y="372" font-size="10">40.3</text>

    <text class="fg" x="218" y="410" text-anchor="end">Efficiency</text><line class="grid" x1="240" y1="406" x2="880" y2="406"/>
    <circle class="luna" cx="558" cy="400" r="5"/><text class="fg" x="547" y="396" font-size="10" text-anchor="end">49.7</text>
    <rect class="sonnet" x="490" y="402" width="10" height="10"/><text class="fg" x="505" y="411" font-size="10">39.8</text>
    <path class="kimi" d="M396 418 L390 407 L402 407 Z"/><text class="fg" x="408" y="417" font-size="10">24.4</text>

    <text class="fg" x="218" y="455" text-anchor="end">Complete handoff</text><line class="grid" x1="240" y1="451" x2="880" y2="451"/>
    <circle class="luna" cx="880" cy="445" r="5"/><text class="fg" x="868" y="441" font-size="10" text-anchor="end">100</text>
    <rect class="sonnet" x="747" y="447" width="10" height="10"/><text class="fg" x="762" y="456" font-size="10">80</text>
    <path class="kimi" d="M624 463 L618 452 L630 452 Z"/><text class="fg" x="636" y="462" font-size="10">60</text>
  </g>
  <text class="muted" x="32" y="498" font-size="12">Five synthetic episodes; one per causal family. Development integration pilot—not a leaderboard.</text>
</svg>
